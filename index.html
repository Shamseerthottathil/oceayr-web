<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCEAYR | Agency</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Orbitron:wght@400&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
<script src="https://unpkg.com/@studio-freight/lenis@1.0.34/dist/lenis.min.js"></script>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
    cursor: default;
    user-select: none;
    touch-action: pan-y; /* Allows scrolling but prevents accidental zooming */
}

.video-wrapper {
    position: fixed; 
    inset: 0;
    z-index: -1;
    overflow: hidden;
}

.video-wrapper video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.45;
}

.logo-container {
    position: fixed;
    top: 25px;
    left: 20px;
    z-index: 1000;
}

.or-logo {
    font-weight: 900;
    font-size: 20px;
    border: 2px solid white;
    padding: 0 8px;
}

.nav-links {
    position: fixed;
    top: 30px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 15px;
    font-size: 9px;
    letter-spacing: .2em;
    text-transform: uppercase;
    z-index: 1000;
}

@media(min-width: 768px) {
    .logo-container { top: 35px; left: 40px; }
    .or-logo { font-size: 24px; }
    .nav-links { top: 40px; gap: 50px; font-size: 11px; letter-spacing: .4em; }
}

.nav-links a {
    color: white;
    text-decoration: none;
    opacity: .5;
    position: relative;
    padding-bottom: 4px;
    transition: opacity 0.3s ease;
}

.nav-links a:hover { opacity: 1; }

.nav-links a::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 0;
    height: 1px;
    background: #00ffff;
    transition: width 0.4s cubic-bezier(0.25, 1, 0.5, 1);
}

.nav-links a:hover::after { width: 100%; }

.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
}

.massive-title {
    font-size: 16vw;
    font-weight: 900;
    line-height: .82;
    text-align: center;
}

@media(min-width: 768px) { .massive-title { font-size: 11vw; } }

.outline {
    color: transparent;
    -webkit-text-stroke: 1px white;
}

.quote {
    font-size: 10px;
    letter-spacing: .3em;
    opacity: .6;
    text-transform: uppercase;
    margin-top: 30px;
    line-height: 2;
    text-align: center;
}

.moving-title-wrap {
    height: 100px;
    display: flex;
    align-items: center;
    overflow: hidden;
    margin: 80px 0;
    border-top: 1px solid rgba(255,255,255,0.1);
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

@media(min-width: 768px) { .moving-title-wrap { height: 140px; } }

.moving-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    color: #00ffff;
    white-space: nowrap;
    letter-spacing: 0.6em;
    animation: moveText 12s linear infinite;
}

@keyframes moveText {
    from { transform: translateX(0%); }
    to { transform: translateX(-50%); }
}

.gallery-section {
    position: relative;
    min-height: 5500px; /* Adjust based on total cards */
}

@media(min-width: 768px) { .gallery-section { min-height: 7000px; } }

.card-wrapper {
    position: absolute;
    will-change: transform;
}

.card {
    width: 65vw; /* Smaller on mobile to allow "scatter" room */
    height: auto;
    aspect-ratio: 4/6;
    overflow: hidden;
    box-shadow: 0 15px 35px rgba(0,0,0, 0.7);
    background: #111;
}

@media(min-width: 768px) {
    .card { width: 460px; height: 680px; }
    .card.narrow { width: 400px; height: 620px; }
}

.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
}
</style>
</head>
<body>

<div class="logo-container">
    <div class="or-logo">OR</div>
</div>

<nav class="nav-links">
    <a href="#">Home</a>
    <a href="#gallery">Work</a>
    <a href="#">Studio</a>
    <a href="#">Contact</a>
</nav>

<section class="hero">
    <div class="video-wrapper">
        <video autoplay muted loop playsinline id="bgVideo">
            <source src="https://res.cloudinary.com/demo/video/upload/q_auto/sea_turtle.mp4" type="video/mp4">
        </video>
    </div>
    <h1 class="massive-title">OCEAYR<br><span class="outline">AGENCY</span></h1>
    <p class="quote">Crafting digital narratives through<br>unconventional marketing atelier</p>
</section>

<div class="moving-title-wrap">
    <div class="moving-title">
        SHUFFLE OUR ART WORKS &nbsp;&nbsp; SHUFFLE OUR ART WORKS &nbsp;&nbsp; SHUFFLE OUR ART WORKS &nbsp;&nbsp;
    </div>
</div>

<section class="gallery-section" id="gallery"></section>

<script>
const video = document.getElementById('bgVideo');
const forcePlay = () => { video.play().catch(()=>{}); };
window.addEventListener('touchstart', forcePlay);
window.addEventListener('scroll', forcePlay);

const lenis = new Lenis({ lerp: 0.08 });
function raf(time) {
    lenis.raf(time);
    requestAnimationFrame(raf);
}
requestAnimationFrame(raf);

const images = ["1020", "1021", "1022", "1023", "1024", "1025", "1026", "1027", "1028", "1029", "1031", "1032", "1033", "1035", "1036"];
const gallery = document.getElementById('gallery');

// The original "Pattern" from your PC view
const baseLayout = [
    {left:5, top:120, type:'normal'}, {left:33, top:260, type:'normal'}, {left:62, top:160, type:'narrow'},
    {left:10, top:900, type:'normal'}, {left:38, top:1060, type:'narrow'}, {left:65, top:940, type:'normal'},
    {left:6, top:1700, type:'normal'}, {left:35, top:1860, type:'normal'}, {left:64, top:1740, type:'narrow'},
    {left:12, top:2500, type:'normal'}, {left:40, top:2640, type:'narrow'}, {left:66, top:2520, type:'normal'}
];

const isMobile = window.innerWidth < 768;

baseLayout.forEach((pos, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'card-wrapper';
    
    // MATHEMATICAL FIX FOR MOBILE: 
    // We "pinch" the horizontal values (left) so they don't fall off screen
    // and "shrink" the vertical spacing (top) so the scroll isn't 10 miles long.
    let finalLeft = isMobile ? (pos.left * 0.45) : pos.left; 
    let finalTop = isMobile ? (pos.top * 0.65) : pos.top;

    wrap.style.cssText = `left:${finalLeft}%; top:${finalTop}px; z-index:${i+10};`;
    
    const card = document.createElement('div');
    card.className = `card draggable ${pos.type === 'narrow' ? 'narrow' : ''}`;
    
    const img = document.createElement('img');
    img.src = `https://picsum.photos/id/${images[i]}/800/1000`;
    
    card.appendChild(img);
    wrap.appendChild(card);
    gallery.appendChild(wrap);
});

// SCROLL GLIDE ANIMATION
const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if(entry.isIntersecting) {
            gsap.to(entry.target, { y: isMobile ? -40 : -80, duration: 2.5, ease: "power2.out" });
        } else {
            gsap.to(entry.target, { y: 0, duration: 2.5, ease: "power2.out" });
        }
    });
}, { threshold: 0.05 });

document.querySelectorAll('.card-wrapper').forEach(el => observer.observe(el));

// DRAG SYSTEM
interact('.draggable').draggable({
    listeners: {
        move(event) {
            const target = event.target;
            const x = (parseFloat(target.dataset.x) || 0) + event.dx;
            const y = (parseFloat(target.dataset.y) || 0) + event.dy;
            target.dataset.x = x;
            target.dataset.y = y;
            target.style.transform = `translate(${x}px, ${y}px)`;
            target.parentElement.style.zIndex = 3000;
        }
    }
});
</script>
</body>
</html>
