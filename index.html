<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCEAYR | Agency</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono:wght@100&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/Draggable.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.34/dist/lenis.min.js"></script>

    <style>
        body { background: #000; color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; cursor: none; }
        
        #cursor {
            position: fixed; width: 12px; height: 12px; background: #fff;
            border-radius: 50%; pointer-events: none; z-index: 99999;
            mix-blend-mode: difference;
        }

        /* FIXED VIDEO CSS */
        .video-wrapper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden; pointer-events: none;
            background: #000; /* Fallback if video fails */
        }
        .video-wrapper video {
            width: 100%; height: 100%; object-fit: cover;
            opacity: 0.4; transition: opacity 1s ease;
        }

        .logo-container { position: fixed; top: 35px; left: 40px; z-index: 1000; }
        .or-logo { font-weight: 900; font-size: 24px; letter-spacing: -0.05em; border: 2px solid #fff; padding: 0 8px; line-height: 1; }

        .nav-links { 
            position: fixed; top: 40px; width: 100%; 
            display: flex; justify-content: center; gap: 50px; 
            font-size: 11px; letter-spacing: 0.4em; text-transform: uppercase; 
            z-index: 1000; 
        }
        .nav-links a { color: #fff; text-decoration: none; opacity: 0.5; transition: 0.3s; }
        .nav-links a:hover { opacity: 1; }

        .hero { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 10; background: transparent; }
        .massive-title { font-weight: 900; font-size: 11vw; line-height: 0.82; letter-spacing: -0.05em; text-align: center; text-transform: uppercase; }
        .outline { -webkit-text-stroke: 1px white; color: transparent; }
        .quote { font-size: 12px; letter-spacing: 0.5em; opacity: 0.6; text-transform: uppercase; margin-top: 30px; text-align: center; max-width: 600px; line-height: 2; }

        #work-section { position: relative; width: 100%; height: 750vh; background: #000; }
        .sticky-viewport { position: sticky; top: 0; width: 100%; height: 100vh; overflow: hidden; }

        .section-header {
            position: absolute; top: 15vh; width: 100%; text-align: center;
            font-family: 'JetBrains Mono', monospace; font-weight: 100; 
            font-size: 11px; letter-spacing: 1em; text-transform: uppercase; 
            z-index: 5; pointer-events: none; opacity: 0; color: #fff;
        }

        .shuffle-item { position: absolute; width: 24vw; will-change: transform; cursor: grab; }
        .img-box { width: 100%; aspect-ratio: 900 / 1125; background: #111; box-shadow: 0 30px 90px rgba(0,0,0,0.8); overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        
        footer { padding: 80px 0; text-align: center; opacity: 0.2; font-size: 10px; letter-spacing: 0.5em; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="cursor"></div>

    <div class="logo-container">
        <div class="or-logo">OR</div>
    </div>

    <nav class="nav-links">
        <a href="#">Home</a>
        <a href="#work-section">Work</a>
        <a href="#">Studio</a>
        <a href="#">Contact</a>
    </nav>

    <section class="hero">
        <div class="video-wrapper">
            <!-- Using a high-bandwidth sample video that auto-plays easily -->
            <video id="bgVideo" autoplay loop muted playsinline poster="https://picsum.photos/1920/1080?grayscale">
                <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            </video>
        </div>
        <h1 class="massive-title">OCEAYR<br><span class="outline">AGENCY</span></h1>
        <p class="quote">Crafting digital narratives through<br>unconventional marketing atelier</p>
    </section>

    <div id="work-section">
        <div class="sticky-viewport" id="card-stack">
            <h2 class="section-header" id="shuffle-text">SHUFFLE OUR ART</h2>
        </div>
    </div>

    <footer>© 2026 OCEAYR ATELIER</footer>

    <script>
        gsap.registerPlugin(ScrollTrigger, Draggable);

        // FORCE VIDEO PLAY ON USER INTERACTION (Browser Security Fix)
        const video = document.getElementById('bgVideo');
        const playVideo = () => {
            if (video.paused) video.play();
            window.removeEventListener('scroll', playVideo);
            window.removeEventListener('click', playVideo);
        };
        window.addEventListener('scroll', playVideo);
        window.addEventListener('click', playVideo);

        const lenis = new Lenis({ lerp: 0.08 });
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);

        const cursor = document.getElementById('cursor');
        window.addEventListener('mousemove', (e) => {
            gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.1 });
        });

        gsap.to("#shuffle-text", {
            opacity: 0.7,
            scrollTrigger: {
                trigger: "#work-section",
                start: "top 40%",
                end: "top 10%",
                scrub: true
            }
        });

        const container = document.getElementById('card-stack');
        const imgIds = [830, 1059, 64, 445, 326, 674, 1044, 250, 682, 600, 311, 453, 522, 1011, 22, 49];
        let highestZ = 100;

        imgIds.forEach((id, i) => {
            const item = document.createElement('div');
            item.className = 'shuffle-item';
            const columns = [4, 27, 50, 73]; 
            const xPos = columns[i % 4];
            const yStartOffset = (Math.random() * 12) - 6;

            gsap.set(item, { left: `${xPos}%`, y: "110vh", zIndex: i + 10 });
            item.innerHTML = `<div class="img-box"><img src="https://picsum.photos/id/${id}/900/1125" alt="Work"></div>`;
            container.appendChild(item);

            Draggable.create(item, {
                type: "x,y",
                onPress: function() {
                    highestZ++;
                    gsap.set(this.target, { zIndex: highestZ });
                    gsap.to(cursor, { scale: 3, opacity: 0.4 });
                },
                onRelease: () => gsap.to(cursor, { scale: 1, opacity: 1 }),
                onDragStart: () => lenis.stop(),
                onDragEnd: () => lenis.start()
            });

            const tl = gsap.timeline({
                scrollTrigger: {
                    trigger: "#work-section",
                    start: `top+=${i * 350 + 200} top`, 
                    end: `top+=${i * 350 + 1400} top`,
                    scrub: 1.2
                }
            });

            tl.to(item, { y: `${25 + yStartOffset}vh`, ease: "power2.out" })
              .to(item, { y: "-130vh", ease: "power2.in" }, "+=0.3");
        });

        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('mouseenter', () => gsap.to(cursor, { scale: 4 }));
            link.addEventListener('mouseleave', () => gsap.to(cursor, { scale: 1 }));
        });
    </script>
</body>
</html>
