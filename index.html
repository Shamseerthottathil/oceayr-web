<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oceayr | Marketing Atelier</title>
    <style>
        body, html { margin: 0; padding: 0; background-color: #000; color: #fff; font-family: 'Georgia', serif; height: 100%; display: flex; align-items: center; justify-content: center; }
        .container { text-align: center; padding: 20px; }
        h1 { font-size: clamp(2rem, 8vw, 4rem); font-weight: 300; letter-spacing: 12px; text-transform: uppercase; margin-bottom: 10px; }
        p.tagline { font-size: 0.8rem; letter-spacing: 5px; text-transform: uppercase; color: #666; margin-bottom: 50px; font-family: sans-serif; }
        .content { max-width: 500px; margin: 0 auto; border-top: 1px solid #222; padding-top: 40px; }
        p.description { font-size: 1.2rem; line-height: 1.8; color: #aaa; font-weight: 200; font-style: italic; }
        .cta { margin-top: 60px; }
        .cta a { color: #fff; text-decoration: none; font-size: 0.7rem; letter-spacing: 4px; border: 1px solid #444; padding: 15px 30px; transition: 0.3s; font-family: sans-serif; }
        .cta a:hover { background: #fff; color: #000; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Oceayr</h1>
        <p class="tagline">Marketing Atelier • Dubai</p>
        <div class="content">
            <p class="description">Defining the culinary horizon through sensory narratives and atmospheric branding.</p>
        </div>
        <div class="cta">
            <a href="mailto:hello@oceayr.com">START A CONVERSATION</a>
        </div>
    </div>
</body>
</html>
