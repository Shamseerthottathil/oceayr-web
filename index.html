<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OCEAYR | Marketing Atelier</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>

    <style>
        * { cursor: none !important; }
        body { background-color: #000; color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }

        /* 🖱️ CURSOR */
        #cursor-dot { width: 8px; height: 8px; background: #fff; position: fixed; top: 0; left: 0; border-radius: 50%; z-index: 10001; pointer-events: none; }
        #cursor-ring { width: 40px; height: 40px; border: 1px solid rgba(255,255,255,0.5); position: fixed; top: 0; left: 0; border-radius: 50%; z-index: 10000; pointer-events: none; }

        .massive-title { font-weight: 900; font-size: clamp(3rem, 15vw, 12rem); line-height: 0.82; letter-spacing: -0.05em; }
        .outline-text { -webkit-text-stroke: 1.5px white; color: transparent; }

        #image-section { position: relative; width: 100%; height: 280vh; background: #000; z-index: 30; overflow: hidden; }

        /* Scroll Wrapper handles the Loud.ae drift */
        .scroll-wrapper { position: absolute; will-change: transform; z-index: 10; }
        
        .draggable {
            width: 180px; height: 240px;
            touch-action: none; user-select: none;
            cursor: grab;
            transition: filter 0.5s ease, transform 0.2s ease;
        }
        @media (min-width: 768px) { .draggable { width: 350px; height: 450px; } }

        .draggable img {
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(100%) brightness(0.3);
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            pointer-events: none;
        }
        .draggable:hover img { filter: grayscale(0%) brightness(1); }

        /* 🔍 FULL SCREEN SELECTION */
        .zoomed {
            position: fixed !important;
            top: 50% !important;
            left: 50% !important;
            width: 80vw !important;
            height: 80vh !important;
            max-width: 1200px;
            transform: translate(-50%, -50%) !important;
            z-index: 9999 !important;
            object-fit: contain;
        }
        .zoomed img { filter: grayscale(0%) brightness(1) !important; }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 9998;
            opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
        }
        #overlay.active { opacity: 1; pointer-events: auto; }

        #hero { position: relative; height: 100vh; overflow: hidden; }
        .logo-or { font-weight: 900; border: 2px solid white; padding: 4px 12px; }
    </style>
</head>
<body>

    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>
    <div id="overlay"></div>

    <nav class="fixed top-0 left-0 w-full z-50 flex flex-col md:flex-row justify-between items-center p-6 md:p-10 mix-blend-difference">
        <div class="logo-or text-xl interactive">OR</div>
        <div class="flex gap-12 uppercase text-[11px] tracking-[0.4em] font-bold">
            <a href="#" class="interactive hover:opacity-50">Work</a>
            <a href="#" class="interactive hover:opacity-50">About</a>
            <a href="#" class="interactive hover:opacity-50">Contact</a>
        </div>
    </nav>

    <section id="hero" class="flex flex-col items-center justify-center text-center px-6">
        <div class="absolute inset-0 z-0">
            <video autoplay loop muted playsinline class="w-full h-full object-cover opacity-30">
                <source src="https://vjs.zencdn.net/v/oceans.mp4" type="video/mp4">
            </video>
        </div>
        <div class="relative z-10">
            <h1 class="massive-title uppercase mb-2">OCEAYR<br><span class="outline-text">AGENCY</span></h1>
            <p class="text-[10px] uppercase tracking-[0.6em] text-white/50 max-w-xl mx-auto mt-8 leading-loose">
                Defining the aesthetic of future culture through disruptive strategy and lifestyle marketing.
            </p>
        </div>
    </section>

    <section id="image-section">
        <div class="scroll-wrapper" data-speed="-250" style="top: 10%; left: 5%;">
            <div class="draggable interactive"><img src="https://picsum.photos/id/830/800/1200"></div>
        </div>
        <div class="scroll-wrapper" data-speed="150" style="top: 5%; left: 60%;">
            <div class="draggable interactive"><img src="https://picsum.photos/id/1059/800/1200"></div>
        </div>
        <div class="scroll-wrapper" data-speed="-120" style="top: 25%; left: 35%;">
            <div class="draggable interactive"><img src="https://picsum.photos/id/64/800/1200"></div>
        </div>
        <div class="scroll-wrapper" data-speed="350" style="top: 45%; left: 70%;">
            <div class="draggable interactive"><img src="https://picsum.photos/id/445/800/1200"></div>
        </div>
        <div class="scroll-wrapper" data-speed="-300" style="top: 60%; left: 10%;">
            <div class="draggable interactive"><img src="https://picsum.photos/id/326/800/1200"></div>
        </div>
        <div class="scroll-wrapper" data-speed="200" style="top: 75%; left: 50%;">
            <div class="draggable interactive"><img src="https://picsum.photos/id/292/800/1200"></div>
        </div>
    </section>

    <footer class="bg-black p-20 text-center border-t border-white/10">
        <div class="text-[9px] tracking-[0.8em] uppercase font-bold opacity-30">© 2026 OCEAYR STUDIO</div>
    </footer>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // 🖱️ CURSOR
        const dot = document.getElementById('cursor-dot');
        const ring = document.getElementById('cursor-ring');
        window.addEventListener('mousemove', (e) => {
            gsap.to(dot, { x: e.clientX, y: e.clientY, duration: 0.1 });
            gsap.to(ring, { x: e.clientX - 20, y: e.clientY - 20, duration: 0.3 });
        });

        // ⚡ SCROLL ENGINE
        const scrollTweens = [];
        gsap.utils.toArray(".scroll-wrapper").forEach((wrapper) => {
            const speed = wrapper.getAttribute("data-speed");
            const tween = gsap.to(wrapper, {
                y: speed, ease: "none",
                scrollTrigger: { trigger: "#image-section", start: "top bottom", end: "bottom top", scrub: 1.2 }
            });
            scrollTweens.push(tween);
        });

        // 🃏 SHUFFLE ENGINE
        interact('.draggable').draggable({
            listeners: {
                move(event) {
                    if (event.target.classList.contains('zoomed')) return;
                    const target = event.target;
                    const x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
                    const y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;
                    target.style.transform = `translate(${x}px, ${y}px)`;
                    target.setAttribute('data-x', x);
                    target.setAttribute('data-y', y);
                }
            }
        });

        // 🔍 SELECTION LOGIC
        const overlay = document.getElementById('overlay');
        let activeZoom = null;

        document.querySelectorAll('.draggable').forEach(el => {
            el.addEventListener('dblclick', function(e) {
                e.stopPropagation();
                if (this.classList.contains('zoomed')) {
                    closeZoom();
                } else {
                    // Disable all scroll parallax so the image can center
                    scrollTweens.forEach(t => t.pause());
                    
                    this.classList.add('zoomed');
                    overlay.classList.add('active');
                    activeZoom = this;
                }
            });
        });

        overlay.addEventListener('click', closeZoom);

        function closeZoom() {
            if (activeZoom) {
                activeZoom.classList.remove('zoomed');
                overlay.classList.remove('active');
                
                // Restart scroll parallax
                scrollTweens.forEach(t => t.play());
                activeZoom = null;
            }
        }
    </script>
</body>
</html>
