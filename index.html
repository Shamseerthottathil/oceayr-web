<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OCEAYR | Marketing Atelier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        
        body { 
            background-color: #000; 
            color: white; 
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* Branding Styles */
        .logo-or { font-weight: 900; border: 2px solid white; padding: 4px 12px; display: inline-block; }
        .outline-text { -webkit-text-stroke: 1.5px white; color: transparent; }

        /* Trending Nav Hover Effect */
        .nav-link {
            position: relative;
            transition: opacity 0.3s ease;
        }
        .nav-link:hover { opacity: 0.6; }
        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: 0;
            left: 0;
            background-color: white;
            transition: width 0.3s ease;
        }
        .nav-link:hover::after { width: 100%; }

        /* Draggable Image Styling */
        .draggable {
            position: absolute;
            width: 140px; height: 190px;
            z-index: 10;
            touch-action: none;
            user-select: none;
            cursor: grab;
        }
        @media (min-width: 768px) {
            .draggable { width: 240px; height: 320px; }
        }
        .draggable img {
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(100%) brightness(0.5);
            border: 0.5px solid rgba(255,255,255,0.2);
            transition: all 0.4s ease;
            pointer-events: none;
        }
        .draggable.dragging img {
            filter: grayscale(0%) brightness(1);
            transform: scale(1.05);
            border-color: #fff;
        }
    </style>
</head>
<body class="select-none">

    <div class="fixed inset-0 z-0">
        <video id="bgVideo" autoplay loop muted playsinline webkit-playsinline class="w-full h-full object-cover opacity-40">
            <source src="https://vjs.zencdn.net/v/oceans.mp4" type="video/mp4">
        </video>
        <div class="absolute inset-0 bg-black/40"></div>
    </div>

    <nav class="fixed top-0 left-0 w-full z-50 flex flex-col md:flex-row justify-between items-center p-6 md:p-10 mix-blend-difference">
        <div class="flex items-center gap-4 mb-4 md:mb-0">
            <div class="logo-or text-xl">OR</div>
            <span class="font-black uppercase tracking-[0.3em] text-[10px]">Oceayr Agency</span>
        </div>

        <div class="flex gap-6 md:gap-12 uppercase text-[9px] md:text-[11px] tracking-[0.4em] font-bold">
            <a href="#" class="nav-link">Home</a>
            <a href="#" class="nav-link">Our Work</a>
            <a href="#" class="nav-link">About Us</a>
            <a href="#" class="nav-link">Contact Us</a>
        </div>
    </nav>

    <section class="relative z-20 h-screen w-full flex flex-col items-center justify-center text-center px-6">
        <h1 class="text-6xl md:text-[150px] font-black uppercase leading-[0.8] tracking-tighter mb-8">
            WE MAKE<br>
            <span class="outline-text">NOISE.</span>
        </h1>
        <button class="px-14 py-6 bg-white text-black font-black uppercase tracking-widest hover:bg-red-600 hover:text-white transition-all text-[10px]">
            START A PROJECT
        </button>
        
        <div class="absolute bottom-10 animate-pulse text-[9px] tracking-[0.6em] uppercase text-gray-500">
            Explore Atelier
        </div>
    </section>

    <section id="image-section" class="relative z-30 w-full h-[150vh]">
        <div class="draggable" style="top: 5%; left: 10%;"><img src="https://picsum.photos/id/830/500/700"></div>
        <div class="draggable" style="top: 15%; left: 60%;"><img src="https://picsum.photos/id/1059/500/700"></div>
        <div class="draggable" style="top: 30%; left: 35%;"><img src="https://picsum.photos/id/64/500/700"></div>
        <div class="draggable" style="top: 45%; left: 75%;"><img src="https://picsum.photos/id/445/500/700"></div>
        <div class="draggable" style="top: 60%; left: 5%;"><img src="https://picsum.photos/id/326/500/700"></div>
        <div class="draggable" style="top: 10%; left: 80%;"><img src="https://picsum.photos/id/338/500/700"></div>
        <div class="draggable" style="top: 75%; left: 45%;"><img src="https://picsum.photos/id/292/500/700"></div>
        <div class="draggable" style="top: 85%; left: 15%;"><img src="https://picsum.photos/id/431/500/700"></div>
    </section>

    <footer class="relative z-40 bg-black p-10 flex flex-col md:flex-row justify-between items-center gap-4 border-t border-white/10">
        <div class="text-[9px] tracking-[0.5em] uppercase text-gray-500">Dubai // 25.2048° N</div>
        <div class="text-[9px] tracking-[0.5em] uppercase font-bold">© 2026 OCEAYR STUDIO</div>
    </footer>

    <script>
        // DRAG ENGINE
        interact('.draggable').draggable({
            inertia: true,
            listeners: {
                start(event) {
                    event.target.classList.add('dragging');
                    event.target.style.zIndex = 100;
                },
                move(event) {
                    const target = event.target;
                    const x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
                    const y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;

                    target.style.transform = `translate(${x}px, ${y}px)`;
                    target.setAttribute('data-x', x);
                    target.setAttribute('data-y', y);
                },
                end(event) {
                    event.target.classList.remove('dragging');
                    event.target.style.zIndex = 10;
                }
            }
        });

        // FORCE VIDEO PLAY
        window.addEventListener('touchstart', () => {
            const video = document.getElementById('bgVideo');
            if (video && video.paused) video.play();
        }, { once: true });
    </script>
</body>
</html>
