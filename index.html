<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OCEAYR | Marketing Atelier</title>
    
    <!-- ⚡ INTER 900: The massive, high-impact font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>

    <style>
        body { 
            background-color: #000; 
            color: white; 
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* ⚡ MASSIVE TYPOGRAPHY (Inter 900) */
        .massive-title {
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: clamp(3rem, 15vw, 12rem);
            line-height: 0.82;
            letter-spacing: -0.05em;
        }

        .outline-text { 
            -webkit-text-stroke: 1.5px white; 
            color: transparent; 
        }

        .logo-or { font-weight: 900; border: 2px solid white; padding: 4px 12px; }

        /* ⚡ NAV STYLES */
        .nav-link { position: relative; transition: opacity 0.3s ease; }
        .nav-link:hover { opacity: 0.6; }
        .nav-link::after {
            content: ''; position: absolute; width: 0; height: 1px;
            bottom: -2px; left: 0; background-color: white; transition: width 0.3s ease;
        }
        .nav-link:hover::after { width: 100%; }

        /* ⚡ MARKETING QUOTE STYLE */
        .marketing-quote {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.6em;
            color: rgba(255, 255, 255, 0.5);
            max-width: 600px;
            line-height: 2;
            margin-top: 30px;
            animation: fadeIn 2s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ⚡ DRAGGABLE GRID (Gallery) */
        #image-section { position: relative; width: 100%; height: 180vh; background: #000; z-index: 30; overflow: hidden; }
        .draggable {
            position: absolute; width: 150px; height: 200px; z-index: 10;
            touch-action: none; user-select: none; cursor: grab;
        }
        @media (min-width: 768px) { .draggable { width: 280px; height: 380px; } }
        .draggable img {
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(100%) brightness(0.4);
            border: 0.5px solid rgba(255,255,255,0.1);
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            pointer-events: none;
        }
        .draggable.dragging img {
            filter: grayscale(0%) brightness(1);
            transform: scale(1.05);
            border-color: #fff;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        #hero { position: relative; height: 100vh; overflow: hidden; }
    </style>
</head>
<body class="select-none">

    <nav class="fixed top-0 left-0 w-full z-50 flex flex-col md:flex-row justify-between items-center p-6 md:p-10 mix-blend-difference">
        <div class="flex items-center gap-4 mb-4 md:mb-0">
            <div class="logo-or text-xl">OR</div>
        </div>
        <div class="flex flex-wrap justify-center gap-6 md:gap-12 uppercase text-[9px] md:text-[11px] tracking-[0.4em] font-bold">
            <a href="#" class="nav-link">Home</a>
            <a href="#" class="nav-link">Our Work</a>
            <a href="#" class="nav-link">About Us</a>
            <a href="#" class="nav-link">Careers</a>
            <a href="#" class="nav-link">Contact Us</a>
        </div>
    </nav>

    <section id="hero" class="flex flex-col items-center justify-center text-center px-6">
        <div class="absolute inset-0 z-0">
            <video id="bgVideo" autoplay loop muted playsinline class="w-full h-full object-cover opacity-40">
                <source src="https://vjs.zencdn.net/v/oceans.mp4" type="video/mp4">
            </video>
            <div class="absolute inset-0 bg-black/50"></div>
        </div>

        <div class="relative z-10 flex flex-col items-center">
            <!-- ⚡ UNIFIED INTER 900 BRANDING -->
            <h1 class="massive-title uppercase mb-2">
                OCEAYR<br>
                <span class="outline-text">AGENCY</span>
            </h1>

            <!-- ⚡ NEW MARKETING QUOTE -->
            <p class="marketing-quote">
                Defining the aesthetic of future culture through disruptive strategy and lifestyle marketing.
            </p>

            <button class="mt-12 px-14 py-6 bg-white text-black font-black uppercase tracking-widest hover:bg-white/90 transition-all text-[10px]">
                START A PROJECT
            </button>
        </div>
    </section>

    <section id="image-section">
        <!-- Interactive draggable images (Replace with your high-res IMAGES/ folders) -->
        <div class="draggable" style="top: 5%; left: 10%;"><img src="https://picsum.photos/id/830/500/700"></div>
        <div class="draggable" style="top: 15%; left: 60%;"><img src="https://picsum.photos/id/1059/500/700"></div>
        <div class="draggable" style="top: 30%; left: 35%;"><img src="https://picsum.photos/id/64/500/700"></div>
        <div class="draggable" style="top: 45%; left: 75%;"><img src="https://picsum.photos/id/445/500/700"></div>
        <div class="draggable" style="top: 60%; left: 5%;"><img src="https://picsum.photos/id/326/500/700"></div>
        <div class="draggable" style="top: 75%; left: 45%;"><img src="https://picsum.photos/id/292/500/700"></div>
    </section>

    <footer class="relative z-40 bg-black p-10 flex flex-col md:flex-row justify-between items-center gap-4 border-t border-white/10">
        <div class="text-[9px] tracking-[0.5em] uppercase text-gray-500">Dubai // UAE</div>
        <div class="text-[9px] tracking-[0.5em] uppercase font-bold">© 2026 OCEAYR STUDIO</div>
    </footer>

    <script>
        // DRAG ENGINE (Fixed code)
        interact('.draggable').draggable({
            inertia: true,
            listeners: {                
                start(event) {
                    event.target.classList.add('dragging');
                    event.target.style.zIndex = 100;
                },
                move(event) {
                    const target = event.target;
                    const x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
                    const y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;
                    target.style.transform = `translate(${x}px, ${y}px)`;
                    target.setAttribute('data-x', x);
                    target.setAttribute('data-y', y);
                },
                end(event) {
                    event.target.classList.remove('dragging');
                    event.target.style.zIndex = 10;
                }
            }
        });

        // Ensure background video plays on mobile
        window.addEventListener('touchstart', () => {
            const video = document.getElementById('bgVideo');
            if (video && video.paused) video.play();
        }, { once: true });
    </script>
</body>
</html>
