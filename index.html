<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OCEAYR | Marketing Atelier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        
        html, body { 
            position: fixed; 
            overflow: hidden; 
            width: 100%; 
            height: 100%;
            margin: 0;
            font-family: 'Inter', sans-serif; 
            background-color: #000;
            touch-action: none;
        }

        .logo-or { font-weight: 900; border: 2px solid white; padding: 2px 10px; display: inline-block; }
        .outline-text { -webkit-text-stroke: 1.5px white; color: transparent; }

        /* DRAGGABLE IMAGES - Highest Z-Index to stay on top */
        .draggable {
            position: absolute;
            width: 120px; height: 160px;
            z-index: 50; /* Higher than UI */
            touch-action: none;
            user-select: none;
            will-change: transform;
            cursor: grab;
        }
        
        @media (min-width: 768px) {
            .draggable { width: 220px; height: 300px; }
        }

        .draggable img {
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(100%) brightness(0.6);
            border: 0.5px solid rgba(255,255,255,0.3);
            pointer-events: none;
            transition: filter 0.4s ease, transform 0.4s ease;
        }

        /* Active dragging state */
        .draggable.dragging { cursor: grabbing; z-index: 100; }
        .draggable.dragging img {
            filter: grayscale(0%) brightness(1);
            transform: scale(1.05);
            border-color: #fff;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        /* Ensure the UI doesn't block the mouse/touch */
        .pointer-none { pointer-events: none; }
        .pointer-auto { pointer-events: auto; }
    </style>
</head>
