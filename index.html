<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCEAYR | Agency</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Orbitron:wght@400&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
<script src="https://unpkg.com/@studio-freight/lenis@1.0.34/dist/lenis.min.js"></script>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
    cursor: default;
    user-select: none;
}

.video-wrapper {
    position: fixed; 
    inset: 0;
    z-index: -1;
    overflow: hidden;
}

.video-wrapper video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.45;
}

.logo-container {
    position: fixed;
    top: 35px;
    left: 40px;
    z-index: 1000;
}

.or-logo {
    font-weight: 900;
    font-size: 24px;
    border: 2px solid white;
    padding: 0 8px;
}

.nav-links {
    position: fixed;
    top: 40px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 50px;
    font-size: 11px;
    letter-spacing: .4em;
    text-transform: uppercase;
    z-index: 1000;
}

.nav-links a {
    color: white;
    text-decoration: none;
    opacity: .5;
    position: relative;
    transition: opacity 0.3s ease;
}

.nav-links a:hover { opacity: 1; }

.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
}

.massive-title {
    font-size: 11vw;
    font-weight: 900;
    line-height: .82;
    text-align: center;
}

.outline {
    color: transparent;
    -webkit-text-stroke: 1px white;
}

.moving-title-wrap {
    height: 140px;
    display: flex;
    align-items: center;
    overflow: hidden;
    margin: 100px 0;
    border-top: 1px solid rgba(255,255,255,0.1);
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.moving-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    color: #00ffff;
    white-space: nowrap;
    letter-spacing: 0.8em;
    animation: moveText 10s linear infinite;
}

@keyframes moveText {
    from { transform: translateX(0%); }
    to { transform: translateX(-50%); }
}

.gallery-section {
    position: relative;
    min-height: 7000px;
    width: 100%;
}

.card-wrapper {
    position: absolute;
    will-change: transform;
}

/* PC SIZES (DEFAULT) */
.card {
    width: 460px;
    height: 680px;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0,0,0, .5);
}

.card.narrow {
    width: 400px;
    height: 620px;
}

/* MOBILE CORRECTION: MAINTAINING PC ROW STRUCTURE */
@media (max-width: 768px) {
    .gallery-section {
        min-height: 3500px; /* Adjusted for scaled height */
    }

    /* We shrink the images by about 60% to fit 3 per row on a phone */
    .card {
        width: 28vw !important; 
        height: 40vw !important;
    }

    .card.narrow {
        width: 24vw !important;
        height: 36vw !important;
    }

    .logo-container { top: 20px; left: 15px; }
    .nav-links { top: 25px; gap: 15px; font-size: 8px; }
    .or-logo { font-size: 18px; }
}

.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
}
</style>
</head>
<body>

<div class="logo-container">
    <div class="or-logo">OR</div>
</div>

<nav class="nav-links">
    <a href="#">Home</a>
    <a href="#gallery">Work</a>
    <a href="#">Studio</a>
    <a href="#">Contact</a>
</nav>

<section class="hero">
    <div class="video-wrapper">
        <video autoplay muted loop playsinline id="bgVideo">
            <source src="https://res.cloudinary.com/demo/video/upload/q_auto/sea_turtle.mp4" type="video/mp4">
        </video>
    </div>
    <h1 class="massive-title">OCEAYR<br><span class="outline">AGENCY</span></h1>
</section>

<div class="moving-title-wrap">
    <div class="moving-title">
        SHUFFLE OUR ART WORKS &nbsp;&nbsp; SHUFFLE OUR ART WORKS &nbsp;&nbsp; SHUFFLE OUR ART WORKS &nbsp;&nbsp;
    </div>
</div>

<section class="gallery-section" id="gallery"></section>

<script>
const video = document.getElementById('bgVideo');
const forcePlay = () => { video.play().catch(()=>{}); };
['touchstart', 'mousedown', 'scroll'].forEach(ev => window.addEventListener(ev, forcePlay, {once: true}));

const lenis = new Lenis({lerp: 0.06});
function raf(time) {
    lenis.raf(time);
    requestAnimationFrame(raf);
}
requestAnimationFrame(raf);

const images = ["1020", "1021", "1022", "1023", "1024", "1025", "1026", "1027", "1028"];
const gallery = document.getElementById('gallery');

// PC LAYOUT (3 Images per row)
const baseLayout = [
    {left:5, top:120, type:'normal'}, {left:36, top:260, type:'normal'}, {left:68, top:160, type:'narrow'},
    {left:8, top:1000, type:'normal'}, {left:38, top:1160, type:'narrow'}, {left:66, top:1040, type:'normal'},
    {left:5, top:1800, type:'normal'}, {left:35, top:1960, type:'normal'}, {left:68, top:1840, type:'narrow'}
];

const isMobile = window.innerWidth <= 768;

baseLayout.forEach((pos, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'card-wrapper';
    
    // On mobile, we keep the exact percentage 'left' to maintain the 3-column row
    // but we scale down the 'top' pixel values so the gap isn't too huge.
    let finalLeft = pos.left; 
    let finalTop = isMobile ? (pos.top * 0.5) : pos.top;

    wrap.style.cssText = `left:${finalLeft}%; top:${finalTop}px; z-index:${i+10};`;
    
    const card = document.createElement('div');
    card.className = `card draggable ${pos.type === 'narrow' ? 'narrow' : ''}`;
    
    const img = document.createElement('img');
    img.src = `https://picsum.photos/id/${images[i]}/800/1000`;
    
    card.appendChild(img);
    wrap.appendChild(card);
    gallery.appendChild(wrap);
});

// SUBTLE SCROLL PARALLAX
const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if(entry.isIntersecting) {
            gsap.to(entry.target, { y: isMobile ? -15 : -60, duration: 2, ease: "power2.out" });
        } else {
            gsap.to(entry.target, { y: 0, duration: 2, ease: "power2.out" });
        }
    });
}, { threshold: 0.05 });

document.querySelectorAll('.card-wrapper').forEach(el => observer.observe(el));

// DRAGGABLE FEATURE
interact('.draggable').draggable({
    listeners: {
        move(event) {
            const target = event.target;
            const x = (parseFloat(target.dataset.x) || 0) + event.dx;
            const y = (parseFloat(target.dataset.y) || 0) + event.dy;
            target.dataset.x = x;
            target.dataset.y = y;
            target.style.transform = `translate(${x}px, ${y}px)`;
            target.parentElement.style.zIndex = 3000;
        }
    }
});
</script>
</body>
</html>
