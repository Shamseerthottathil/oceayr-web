<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OCEAYR | Marketing Atelier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;900&display=swap');
        
        /* ⚡ PERFORMANCE & UI FIXES ⚡ */
        * { 
            cursor: none !important; 
            -webkit-tap-highlight-color: transparent;
            user-select: none; 
        }

        body { 
            background-color: #000; color: white; font-family: 'Inter', sans-serif;
            margin: 0; overflow-x: hidden; width: 100%;
        }

        /* GPU Accelerated Custom Cursor */
        #custom-cursor {
            width: 20px; height: 20px; background: white; border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 10000;
            mix-blend-mode: difference; 
            transform: translate3d(-50%, -50%, 0);
            will-change: transform;
            transition: width 0.3s cubic-bezier(0.23, 1, 0.32, 1), 
                        height 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            display: none;
        }
        @media (pointer: fine) { #custom-cursor { display: block; } }
        #custom-cursor.hovering { width: 65px; height: 65px; }

        /* Responsive Navigation */
        header { width: 100%; padding: 20px; position: fixed; top: 0; z-index: 100; }
        .nav-container { display: flex; justify-content: space-between; align-items: center; max-width: 1400px; margin: 0 auto; }
        
        .logo-or { font-weight: 900; border: 1.5px solid white; padding: 2px 8px; font-size: 14px; flex-shrink: 0; }
        
        .nav-links { display: flex; gap: 12px; align-items: center; }
        .nav-link { 
            font-size: 8px; font-weight: 800; text-transform: uppercase; 
            letter-spacing: 0.1em; white-space: nowrap; opacity: 0.8;
        }

        @media (min-width: 768px) {
            header { padding: 40px; }
            .logo-or { font-size: 20px; padding: 4px 10px; }
            .nav-link { font-size: 11px; letter-spacing: 0.2em; }
            .nav-links { gap: 35px; }
        }

        /* Hero Scaling */
        .hero-container { position: relative; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 20px; }
        
        .main-title { 
            font-weight: 900; text-transform: uppercase; line-height: 0.9; 
            font-size: 18vw; letter-spacing: -0.05em; 
        }
        @media (min-width: 768px) { .main-title { font-size: 180px; } }

        .sub-title { 
            text-transform: uppercase; opacity: 0.4; margin-top: 20px;
            font-size: 8px; letter-spacing: 0.8em; 
        }
        @media (min-width: 768px) { .sub-title { font-size: 12px; letter-spacing: 1.5em; } }

        /* Shuffle Header (Simple Lifestyle Font) */
        .shuffle-header { padding: 80px 20px 40px 20px; text-align: center; }
        .shuffle-caption { 
            font-weight: 100; text-transform: uppercase; color: rgba(255,255,255,0.9);
            font-size: 14px; letter-spacing: 0.6em; margin-left: 0.6em;
        }
        @media (min-width: 768px) { .shuffle-caption { font-size: 28px; letter-spacing: 1.2em; margin-left: 1.2em; } }

        /* Performance Optimized Play Zone */
        #play-zone {
            position: relative; width: 95%; max-width: 1400px; height: 800px; 
            margin: 0 auto 100px auto; border: 1px solid rgba(255,255,255,0.03); overflow: hidden;
        }
        @media (min-width: 768px) { #play-zone { height: 1250px; } }

        .draggable { 
            position: absolute; width: 90px; height: 120px; z-index: 20; 
            touch-action: none; will-change: transform;
        }
        @media (min-width: 768px) { .draggable { width: 240px; height: 320px; } }

        .draggable img { 
            width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); 
            transition: filter 0.3s ease, transform 0.3s ease; 
            border: 0.5px solid rgba(255,255,255,0.1); 
            pointer-events: none; backface-visibility: hidden;
        }

        .draggable.dragging img, .draggable:hover img { 
            filter: grayscale(0%) brightness(1.05); 
            transform: scale(1.03); border-color: white;
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <header class="mix-blend-difference">
        <div class="nav-container">
            <div class="logo-or interactive">OR</div>
            <div class="nav-links">
                <a href="#" class="nav-link interactive">Home</a>
                <a href="#" class="nav-link interactive">Our Works</a>
                <a href="#" class="nav-link interactive">Careers</a>
                <a href="#" class="nav-link interactive">Contact Us</a>
            </div>
        </div>
    </header>

    <section class="hero-container">
        <h1 class="main-title">OCEAYR</h1>
        <p class="sub-title">Lifestyle Marketing Atelier</p>
    </section>

    <section id="shuffle-section">
        <div class="shuffle-header">
            <h2 class="shuffle-caption">Shuffle our Vision</h2>
        </div>
        <div id="play-zone">
            <div class="draggable interactive" style="top: 5%; left: 8%;"><img src="IMAGES/Image (1).jpeg"></div>
            <div class="draggable interactive" style="top: 2%; left: 40%;"><img src="IMAGES/Image (2).jpeg"></div>
            <div class="draggable interactive" style="top: 8%; left: 70%;"><img src="IMAGES/Image (3).jpeg"></div>
            
            <div class="draggable interactive" style="top: 28%; left: 2%;"><img src="IMAGES/Image (4).jpeg"></div>
            <div class="draggable interactive" style="top: 32%; left: 35%;"><img src="IMAGES/Image (12).jpeg"></div>
            <div class="draggable interactive" style="top: 25%; left: 65%;"><img src="IMAGES/Image (6).jpeg"></div>
            
            <div class="draggable interactive" style="top: 55%; left: 15%;"><img src="IMAGES/Image (7).jpeg"></div>
            <div class="draggable interactive" style="top: 50%; left: 48%;"><img src="IMAGES/Image (8).jpeg"></div>
            <div class="draggable interactive" style="top: 58%; left: 78%;"><img src="IMAGES/Image (10).jpeg"></div>
            
            <div class="draggable interactive" style="top: 82%; left: 5%;"><img src="IMAGES/Image (11).jpeg"></div>
            <div class="draggable interactive" style="top: 78%; left: 38%;"><img src="IMAGES/Image (9).jpeg"></div>

        </div>
    </section>

    <footer class="p-10 md:p-20 text-center bg-black border-t border-white/5 text-[8px] md:text-[9px] tracking-[0.5em] text-gray-600 uppercase">
        © 2026 Oceayr Studio // Dubai
    </footer>

    <script>
        // ⚡ SMOOTH CURSOR LOGIC ⚡
        const cursor = document.getElementById('custom-cursor');
        let mX = 0, mY = 0, bX = 0, bY = 0;
        const lerpSpeed = 0.2; // Fast, responsive follow

        document.addEventListener('mousemove', (e) => { mX = e.clientX; mY = e.clientY; });
        
        function moveCursor() {
            bX += (mX - bX) * lerpSpeed;
            bY += (mY - bY) * lerpSpeed;
            // Using translate3d to force GPU acceleration and remove lag
            cursor.style.transform = `translate3d(${bX}px, ${bY}px, 0) translate(-50%, -50%)`;
            requestAnimationFrame(moveCursor);
        }
        moveCursor();

        document.querySelectorAll('.interactive').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('hovering'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('hovering'));
        });

        // ⚡ DRAG LOGIC ⚡
        interact('.draggable').draggable({
            inertia: true,
            modifiers: [
                interact.modifiers.restrictRect({
                    restriction: '#play-zone',
                    endOnly: false 
                })
            ],
            listeners: {
                start(event) { 
                    event.target.style.zIndex = 500; 
                    event.target.classList.add('dragging');
                },
                move(event) {
                    const t = event.target;
                    const x = (parseFloat(t.getAttribute('data-x')) || 0) + event.dx;
                    const y = (parseFloat(t.getAttribute('data-y')) || 0) + event.dy;
                    // transform: translate is fast, but we combine it with data attributes for tracking
                    t.style.transform = `translate3d(${x}px, ${y}px, 0)`;
                    t.setAttribute('data-x', x);
                    t.setAttribute('data-y', y);
                },
                end(event) { 
                    event.target.style.zIndex = 20; 
                    event.target.classList.remove('dragging');
                }
            }
        });
    </script>
</body>
</html>
