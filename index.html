<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCEAYR | Agency</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
<script src="https://unpkg.com/@studio-freight/lenis@1.0.34/dist/lenis.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--c:#00ffff;--b:rgba(255,255,255,0.12);--bg:#000;--fg:#fff}
html,body{background:var(--bg);color:var(--fg);font-family:'Inter',sans-serif;overflow-x:hidden;cursor:default;user-select:none;transition:background .6s,color .6s}

/* 🔥 GPU OPTIMIZATION */
.cw{
  position:absolute;
  will-change:transform;
  transform:translate3d(0,0,0);
  cursor:grab;
  touch-action:none;
  backface-visibility:hidden;
}

.card{overflow:hidden;background:#111}
.card img{width:100%;height:100%;object-fit:cover;display:block;transition:.65s}
.cw:hover .card img{transform:scale(1.045)}
</style>
</head>

<body>

<section class="gallery-section" id="gallery"></section>

<script>

/* 🔥 LENIS OPTIMIZED */
const lenis = new Lenis({ lerp: 0.06, smoothWheel: true });

const VW = window.innerWidth;
const isMobile = VW <= 768;

/* IMAGE LIST */
const IMGS = [
'https://images.unsplash.com/photo-1483985988355-763728e1935b?w=900&q=85',
'https://images.unsplash.com/photo-1469334031218-e382a71b716b?w=900&q=85',
'https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=900&q=85',
'https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=900&q=85',

'https://raw.githubusercontent.com/Shamseerthottathil/oceayr-web/main/IMAGES/Image%20(1).jpeg',
'https://raw.githubusercontent.com/Shamseerthottathil/oceayr-web/main/IMAGES/Image%20(2).jpeg',
'https://raw.githubusercontent.com/Shamseerthottathil/oceayr-web/main/IMAGES/Image%20(3).jpeg',
'https://raw.githubusercontent.com/Shamseerthottathil/oceayr-web/main/IMAGES/Image%20(4).jpeg',

'https://raw.githubusercontent.com/Shamseerthottathil/oceayr-web/main/IMAGES/Image%20(6).jpeg',
'https://raw.githubusercontent.com/Shamseerthottathil/oceayr-web/main/IMAGES/Image%20(7).jpeg',
'https://raw.githubusercontent.com/Shamseerthottathil/oceayr-web/main/IMAGES/Image%20(8).jpeg',
'https://raw.githubusercontent.com/Shamseerthottathil/oceayr-web/main/IMAGES/Image%20(9).jpeg',

'https://raw.githubusercontent.com/Shamseerthottathil/oceayr-web/main/IMAGES/Image%20(10).jpeg',
'https://raw.githubusercontent.com/Shamseerthottathil/oceayr-web/main/IMAGES/Image%20(11).jpeg',
'https://raw.githubusercontent.com/Shamseerthottathil/oceayr-web/main/IMAGES/Image%20(12).jpeg'
];

const CW = isMobile ? Math.round(VW * 0.38) : Math.round(VW * 0.365);
const CH = isMobile ? Math.round(VW * 0.55) : Math.round(VW * 0.48);
const PITCH = isMobile ? Math.round(VW * 0.315) : Math.round(VW * 0.31);
const COL_X = [0, PITCH, PITCH * 2];
const COL_Y0 = [Math.round(CH * 0.36), 0, Math.round(CH * 0.18)];
const GAP = 18;
const SPD = [0.18, 0.46, 0.30];
const PER_COL = 6;

const CARDS = [];
for (let c = 0; c < 3; c++) {
  for (let r = 0; r < PER_COL; r++) {
    CARDS.push({
      col: c,
      row: r,
      img: IMGS[(c * PER_COL + r) % IMGS.length],
      domTop: COL_Y0[c] + r * (CH + GAP)
    });
  }
}

const gallery = document.getElementById('gallery');
gallery.style.height = '3000px';

const elems = [], dragOff = [];

CARDS.forEach((d, i) => {
  const wrap = document.createElement('div');
  wrap.className = 'cw';
  wrap.style.left = COL_X[d.col] + 'px';
  wrap.style.top = d.domTop + 'px';
  wrap.style.width = CW + 'px';

  const card = document.createElement('div');
  card.className = 'card';
  card.style.width = CW + 'px';
  card.style.height = CH + 'px';

  const img = document.createElement('img');

  /* 🔥 IMAGE OPTIMIZATION */
  img.src = d.img.includes('unsplash')
    ? d.img + '&w=700&q=70&auto=format'
    : d.img;

  img.loading = i < 4 ? 'eager' : 'lazy';
  img.decoding = 'async';

  img.alt = 'Work ' + (i + 1);

  card.appendChild(img);
  wrap.appendChild(card);
  gallery.appendChild(wrap);

  elems.push({ el: wrap, col: d.col });
  dragOff.push({ x: 0, y: 0 });
});

/* 🔥 TAB PERFORMANCE */
let isTabActive = true;
document.addEventListener('visibilitychange', () => {
  isTabActive = !document.hidden;
});

/* 🔥 OPTIMIZED LOOP */
function tick(time) {
  if (!isTabActive) return requestAnimationFrame(tick);

  lenis.raf(time);

  for (let i = 0; i < elems.length; i++) {
    const c = elems[i];
    const dy = dragOff[i].y;
    c.el.style.transform = `translate3d(${dragOff[i].x}px,${dy}px,0)`;
  }

  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

/* DRAG */
interact('.cw').draggable({
  inertia: true,
  listeners: {
    move(e) {
      const idx = elems.findIndex(c => c.el === e.target);
      if (idx < 0) return;
      dragOff[idx].x += e.dx;
      dragOff[idx].y += e.dy;
    }
  }
});

</script>

</body>
</html>
