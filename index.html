<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OCEAYR | Marketing Atelier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;900&display=swap');
        
        /* Force-hide all system cursors, including the 'move' arrow from your screenshot */
        * { cursor: none !important; }

        body { 
            background-color: #000; color: white; font-family: 'Inter', sans-serif;
            margin: 0; overflow-x: hidden;
        }

        #custom-cursor {
            width: 20px; height: 20px; background: white; border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 10000;
            mix-blend-mode: difference; transform: translate(-50%, -50%);
            transition: width 0.3s ease, height 0.3s ease;
            display: none;
        }
        @media (pointer: fine) { #custom-cursor { display: block; } }
        #custom-cursor.hovering { width: 85px; height: 85px; }

        .logo-or { font-weight: 900; border: 2px solid white; padding: 4px 10px; display: inline-block; }
        .nav-link { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.12em; white-space: nowrap; }

        .hero-container { position: relative; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5; }
        
        #shuffle-section { position: relative; width: 100%; background: #000; display: flex; flex-direction: column; align-items: center; }
        .shuffle-header { padding: 100px 0 50px 0; text-align: center; }
        .shuffle-caption { font-weight: 100; font-size: clamp(1.2rem, 4vw, 2.5rem); text-transform: uppercase; letter-spacing: 1.2em; color: rgba(255,255,255,0.9); margin-left: 1.2em; }

        #play-zone {
            position: relative; width: 95%; max-width: 1400px; height: 1250px; 
            margin-bottom: 100px; border: 1px solid rgba(255,255,255,0.03); overflow: hidden;
        }

        .draggable { position: absolute; width: 240px; height: 320px; z-index: 20; touch-action: none; }
        .draggable img { 
            width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); 
            transition: filter 0.4s ease, transform 0.4s ease; border: 0.5px solid rgba(255,255,255,0.1); 
        }

        .draggable.dragging img, .draggable:hover img { 
            filter: grayscale(0%) brightness(1.05); transform: scale(1.03); border-color: rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <header class="fixed top-0 w-full z-50 p-6 md:p-10 mix-blend-difference">
        <nav class="flex justify-between items-center w-full">
            <div class="logo-or text-xl interactive">OR</div>
            <div class="nav-links flex gap-8">
                <a href="#" class="nav-link interactive">Home</a>
                <a href="#" class="nav-link interactive">Our Works</a>
                <a href="#" class="nav-link interactive">Careers</a>
                <a href="#" class="nav-link interactive">Contact Us</a>
            </div>
        </nav>
    </header>

    <section class="hero-container">
        <h1 class="text-7xl md:text-[180px] font-black uppercase leading-none tracking-tighter">OCEAYR</h1>
        <p class="text-[10px] md:text-xs tracking-[1.5em] uppercase opacity-30 mt-6">Lifestyle Marketing Atelier</p>
    </section>

    <section id="shuffle-section">
        <div class="shuffle-header"><h2 class="shuffle-caption">Shuffle our Vision</h2></div>
        <div id="play-zone">
            <div class="draggable interactive" style="top: 2%; left: 5%;"><img src="IMAGES/Image (1).jpeg"></div>
            <div class="draggable interactive" style="top: 5%; left: 35%;"><img src="IMAGES/Image (2).jpeg"></div>
            <div class="draggable interactive" style="top: 2%; left: 68%;"><img src="IMAGES/Image (3).jpeg"></div>
            <div class="draggable interactive" style="top: 28%; left: 15%;"><img src="IMAGES/Image (4).jpeg"></div>
            <div class="draggable interactive" style="top: 25%; left: 50%;"><img src="IMAGES/Image (12).jpeg"></div>
            <div class="draggable interactive" style="top: 30%; left: 80%;"><img src="IMAGES/Image (6).jpeg"></div>
            <div class="draggable interactive" style="top: 55%; left: 5%;"><img src="IMAGES/Image (7).jpeg"></div>
            <div class="draggable interactive" style="top: 52%; left: 38%;"><img src="IMAGES/Image (8).jpeg"></div>
            <div class="draggable interactive" style="top: 58%; left: 70%;"><img src="IMAGES/Image (10).jpeg"></div>
            <div class="draggable interactive" style="top: 80%; left: 12%;"><img src="IMAGES/Image (11).jpeg"></div>
        </div>
    </section>

    <footer class="p-20 text-center bg-black border-t border-white/5 text-[9px] tracking-[0.8em] text-gray-600 uppercase">
        © 2026 Oceayr Studio // Dubai
    </footer>

    <script>
        const cursor = document.getElementById('custom-cursor');
        let mX = 0, mY = 0, bX = 0, bY = 0;
        document.addEventListener('mousemove', (e) => { mX = e.clientX; mY = e.clientY; });
        function moveCursor() {
            bX += (mX - bX) * 0.18; bY += (mY - bY) * 0.18;
            cursor.style.left = bX + 'px'; cursor.style.top = bY + 'px';
            requestAnimationFrame(moveCursor);
        }
        moveCursor();

        document.querySelectorAll('.interactive').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('hovering'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('hovering'));
        });

        interact('.draggable').draggable({
            inertia: true,
            modifiers: [interact.modifiers.restrictRect({ restriction: '#play-zone', endOnly: false })],
            listeners: {
                start(event) { event.target.style.zIndex = 200; },
                move(event) {
                    const t = event.target;
                    const x = (parseFloat(t.getAttribute('data-x')) || 0) + event.dx;
                    const y = (parseFloat(t.getAttribute('data-y')) || 0) + event.dy;
                    t.style.transform = `translate(${x}px, ${y}px)`;
                    t.setAttribute('data-x', x); t.setAttribute('data-y', y);
                },
                end(event) { event.target.style.zIndex = 20; }
            }
        });
    </script>
</body>
</html>
