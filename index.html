<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCEAYR | Agency</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Playfair+Display:ital,wght@1,400;1,700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
<script src="https://unpkg.com/@studio-freight/lenis@1.0.34/dist/lenis.min.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background: #000;
    color: #fff;
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
    cursor: default;
    user-select: none;
}

/* ── NAV — fixed always on top ── */
.logo-container {
    position: fixed;
    top: 35px;
    left: 40px;
    z-index: 1000;
}
.or-logo {
    font-weight: 900;
    font-size: 24px;
    border: 2px solid white;
    padding: 0 8px;
}
.nav-links {
    position: fixed;
    top: 40px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 50px;
    font-size: 11px;
    letter-spacing: .4em;
    text-transform: uppercase;
    z-index: 1000;
}
.nav-links a {
    color: white;
    text-decoration: none;
    opacity: .5;
    position: relative;
    padding-bottom: 4px;
    transition: opacity 0.3s ease;
}
.nav-links a:hover { opacity: 1; }
.nav-links a::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 0; height: 1px;
    background: #00ffff;
    transition: width 0.4s cubic-bezier(0.25, 1, 0.5, 1);
}
.nav-links a:hover::after { width: 100%; }

/* ── HERO — video is INSIDE here, clipped to this section only ── */
.hero {
    position: relative;          /* contains the video */
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;            /* video never bleeds out */
    background: #000;
}

/* Video lives INSIDE hero — NOT fixed on body */
.hero-video {
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
}
.hero-video video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.5;
}

.hero h1 {
    position: relative;
    z-index: 1;
    font-size: 11vw;
    font-weight: 900;
    line-height: .82;
    text-align: center;
    font-family: 'Inter', sans-serif;
}
.outline {
    color: transparent;
    -webkit-text-stroke: 1px white;
}

/* ── TICKER ──
   Font: Playfair Display italic — editorial, luxury, loud.ae style
   Two spans in one flex track → seamless CSS loop
── */
.ticker-wrap {
    height: 110px;
    display: flex;
    align-items: center;
    overflow: hidden;
    background: #000;
    border-top: 1px solid rgba(255,255,255,0.12);
    border-bottom: 1px solid rgba(255,255,255,0.12);
    /* NO margin-bottom — gallery follows immediately */
}
.ticker-track {
    display: flex;
    flex-shrink: 0;
    width: max-content;
    animation: tickerMove 14s linear infinite;
    will-change: transform;
}
.ticker-track span {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 28px;
    font-weight: 400;
    color: #fff;
    white-space: nowrap;
    letter-spacing: 0.25em;
    padding-right: 2.5em;
    flex-shrink: 0;
    opacity: 0.9;
}
/* Accent dots between words */
.ticker-track span em {
    font-style: normal;
    color: #00ffff;
    margin: 0 0.3em;
}
@keyframes tickerMove {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
}

/* ── GALLERY SECTION — solid black, no video ── */
.gallery-section {
    position: relative;
    background: #000;
    /* height set by JS */
}

/* ── CARD WRAPPERS ── */
.card-wrapper {
    position: absolute;
    will-change: transform;
    cursor: grab;
    touch-action: none; /* required for interact.js on mobile */
}
.card-wrapper:active { cursor: grabbing; }

/* PC card sizes */
.card {
    width: 420px;
    height: 620px;
    overflow: hidden;
    box-shadow: 0 16px 50px rgba(0,0,0,0.8);
    background: #111;
}
.card.narrow {
    width: 360px;
    height: 560px;
}
.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
    transition: transform 0.7s ease;
}
.card-wrapper:hover .card img {
    transform: scale(1.05);
}

/* ── MOBILE ── */
@media (max-width: 768px) {
    .logo-container { top: 18px; left: 16px; }
    .or-logo { font-size: 18px; }
    .nav-links { top: 20px; gap: 12px; font-size: 7px; letter-spacing: 0.15em; }
    .hero h1 { font-size: 16vw; }

    .ticker-wrap { height: 64px; }
    .ticker-track span { font-size: 16px; letter-spacing: 0.15em; padding-right: 1.5em; }

    /* Mobile card sizes: 3 columns visible */
    .card {
        width: 29vw !important;
        height: 42vw !important;
    }
    .card.narrow {
        width: 26vw !important;
        height: 38vw !important;
    }
}
</style>
</head>
<body>

<div class="logo-container"><div class="or-logo">OR</div></div>

<nav class="nav-links">
    <a href="#">Home</a>
    <a href="#gallery">Work</a>
    <a href="#">Studio</a>
    <a href="#">Contact</a>
</nav>

<!-- HERO: video is INSIDE this section, clipped by overflow:hidden -->
<section class="hero">
    <div class="hero-video">
        <video autoplay muted loop playsinline id="bgVideo">
            <!-- Fashion-oriented video from Pexels (free, no auth needed) -->
            <source src="https://videos.pexels.com/video-files/3209828/3209828-uhd_2560_1440_25fps.mp4" type="video/mp4">
            <!-- Fallback fashion video -->
            <source src="https://videos.pexels.com/video-files/2795750/2795750-uhd_2560_1440_30fps.mp4" type="video/mp4">
        </video>
    </div>
    <h1>OCEAYR<br><span class="outline">AGENCY</span></h1>
</section>

<!-- TICKER: immediately after hero, no gap -->
<div class="ticker-wrap">
    <div class="ticker-track">
        <span>Shuffle Our Art Works <em>✦</em> Shuffle Our Art Works <em>✦</em> Shuffle Our Art Works <em>✦</em> Shuffle Our Art Works <em>✦</em></span>
        <span>Shuffle Our Art Works <em>✦</em> Shuffle Our Art Works <em>✦</em> Shuffle Our Art Works <em>✦</em> Shuffle Our Art Works <em>✦</em></span>
    </div>
</div>

<!-- GALLERY: solid black background, images start here -->
<section class="gallery-section" id="gallery"></section>

<script>
/* ── VIDEO PLAY ── */
const video = document.getElementById('bgVideo');
video.muted = true;
video.play().catch(() => {
    ['touchstart','click'].forEach(ev =>
        window.addEventListener(ev, () => video.play().catch(()=>{}), {once:true})
    );
});

/* ── LENIS SMOOTH SCROLL ── */
const lenis = new Lenis({ lerp: 0.07 });

/* ── DEVICE ── */
const isMobile = window.innerWidth <= 768;
const VW = window.innerWidth;

/* ── IMAGES ── */
const images = [
    'https://images.unsplash.com/photo-1529139574466-a303027c1d8b?w=900&q=85', // fashion
    'https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=900&q=85',
    'https://images.unsplash.com/photo-1469334031218-e382a71b716b?w=900&q=85',
    'https://images.unsplash.com/photo-1483985988355-763728e1935b?w=900&q=85',
    'https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=900&q=85',
    'https://images.unsplash.com/photo-1509631179647-0177331693ae?w=900&q=85',
    'https://images.unsplash.com/photo-1496747611176-843222e1e57c?w=900&q=85',
    'https://images.unsplash.com/photo-1445205170230-053b83016050?w=900&q=85',
    'https://images.unsplash.com/photo-1566206091558-7f218b696731?w=900&q=85',
];

/* ─────────────────────────────────────────────────────────────────────
   LAYOUT — THE LOUD.AE FORMULA:

   1. ROW GAP < CARD HEIGHT → rows overlap in static DOM already
   2. Each card has a UNIQUE speed → cards from different rows
      weave past each other as you scroll (depth illusion)
   3. Within each row, cards are staggered vertically (not aligned)
      → the "scattered editorial" look

   PC: card 420×620. Row gap = 400px → 220px static DOM overlap per row.
   Mobile: card ~29vw × ~42vw. Row gap = 60% of card height.

   Speed range 0.28–0.58: fast enough to feel swift, varied enough
   for cards to cross each other.
─────────────────────────────────────────────────────────────────────*/

let layout;

if (!isMobile) {
    // PC layout — 3 columns, rows 400px apart (card=620 so 220px already overlapping)
    const ROW = 400; // gap between row base tops
    layout = [
        // Row 0
        { left:'4%',  top: 60,        type:'normal', speed:0.52 },
        { left:'33%', top: 200,       type:'normal', speed:0.28 },
        { left:'62%', top: 100,       type:'narrow', speed:0.44 },
        // Row 1
        { left:'7%',  top: 60+ROW,    type:'narrow', speed:0.36 },
        { left:'36%', top: 200+ROW,   type:'normal', speed:0.58 },
        { left:'64%', top: 100+ROW,   type:'normal', speed:0.30 },
        // Row 2
        { left:'4%',  top: 60+ROW*2,  type:'normal', speed:0.48 },
        { left:'33%', top: 200+ROW*2, type:'narrow', speed:0.32 },
        { left:'62%', top: 100+ROW*2, type:'normal', speed:0.54 },
    ];
} else {
    // Mobile: card width = 29vw, height = 42vw
    // On 390px screen: card ≈ 113px × 164px
    // Row gap = 100px → 64px overlap already in DOM
    const cardH = Math.round(VW * 0.42);
    const ROW   = Math.round(cardH * 0.62); // gap < cardH → overlap

    layout = [
        // Row 0
        { left:'2%',  top: 20,        type:'normal', speed:0.52 },
        { left:'36%', top: 90,        type:'normal', speed:0.28 },
        { left:'67%', top: 40,        type:'narrow', speed:0.44 },
        // Row 1
        { left:'2%',  top: 20+ROW,    type:'narrow', speed:0.36 },
        { left:'36%', top: 90+ROW,    type:'normal', speed:0.58 },
        { left:'67%', top: 40+ROW,    type:'normal', speed:0.30 },
        // Row 2
        { left:'2%',  top: 20+ROW*2,  type:'normal', speed:0.48 },
        { left:'36%', top: 90+ROW*2,  type:'narrow', speed:0.32 },
        { left:'67%', top: 40+ROW*2,  type:'normal', speed:0.54 },
    ];
}

/* ─────────────────────────────────────────────────────────────────────
   GALLERY HEIGHT
   Must be tall enough that:
   - All cards are reachable by scroll
   - After parallax pulls cards up, the last card's BOTTOM edge
     sits at/near the bottom of the gallery → no blank space

   Formula: last card bottom in DOM + extra scroll room for parallax.
   The parallax travel for a card = maxScroll × speed.
   maxScroll ≈ galleryH (approx). So we need:
   galleryH > lastCardBottom + speed × galleryH
   → galleryH > lastCardBottom / (1 - maxSpeed)
   With maxSpeed=0.58: galleryH = lastCardBottom / 0.42 + padding
─────────────────────────────────────────────────────────────────────*/
const cardH   = isMobile ? Math.round(VW * 0.42) : 620;
const lastTop = Math.max(...layout.map(l => l.top));
// Enough height so fast cards (speed 0.58) travel the full DOM distance
const galleryH = Math.round((lastTop + cardH) / (1 - 0.58)) + (isMobile ? 200 : 600);

const gallery = document.getElementById('gallery');
gallery.style.height = galleryH + 'px';

/* ── BUILD CARDS ── */
const wrappers    = [];
const dragOffsets = [];

layout.forEach((pos, i) => {
    const wrap = document.createElement('div');
    wrap.className    = 'card-wrapper';
    wrap.style.left   = pos.left;
    wrap.style.top    = pos.top + 'px';
    wrap.style.zIndex = 10 + i;

    const card = document.createElement('div');
    card.className = 'card' + (pos.type === 'narrow' ? ' narrow' : '');

    const img = document.createElement('img');
    img.src     = images[i];
    img.loading = i < 3 ? 'eager' : 'lazy';
    img.alt     = 'Artwork ' + (i + 1);

    card.appendChild(img);
    wrap.appendChild(card);
    gallery.appendChild(wrap);
    wrappers.push(wrap);
    dragOffsets.push({ x: 0, y: 0 });
});

/* ─────────────────────────────────────────────────────────────────────
   PARALLAX ENGINE
   Reads lenis.scroll every frame.
   Each card's visual position = DOM top + (drag offset) - (scroll × speed)
   Negative scroll term = card moves UP as user scrolls DOWN.
   Different speeds per card = depth layering + inter-row crossing.
─────────────────────────────────────────────────────────────────────*/
function updateParallax(scrollY) {
    wrappers.forEach((wrap, i) => {
        const speed = layout[i].speed;
        const dx    = dragOffsets[i].x;
        const dy    = dragOffsets[i].y - (scrollY * speed);
        wrap.style.transform = `translate(${dx}px,${dy}px)`;
    });
}

lenis.on('scroll', ({ scroll }) => updateParallax(scroll));

function raf(time) {
    lenis.raf(time);
    requestAnimationFrame(raf);
}
requestAnimationFrame(raf);
updateParallax(0);

/* ─────────────────────────────────────────────────────────────────────
   DRAGGABLE — interact.js
   Works on both mouse (PC) and touch (mobile).
   touch-action:none on .card-wrapper (set in CSS) is required for
   interact.js to intercept touch events before the browser does.
   Drag offset stored separately so parallax + drag combine cleanly.
─────────────────────────────────────────────────────────────────────*/
interact('.card-wrapper').draggable({
    inertia: true,   // flick momentum — feels natural on mobile
    listeners: {
        start(event) {
            event.target.style.zIndex = 3000;
            event.target.style.cursor = 'grabbing';
        },
        move(event) {
            const idx = wrappers.indexOf(event.target);
            if (idx < 0) return;
            dragOffsets[idx].x += event.dx;
            dragOffsets[idx].y += event.dy;
            updateParallax(lenis.scroll);
        },
        end(event) {
            event.target.style.cursor = 'grab';
        }
    }
});
</script>
</body>
</html>
