<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OCEAYR | Marketing Atelier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        
        html, body { 
            position: fixed; 
            overflow: hidden; 
            width: 100%; 
            height: 100%;
            margin: 0;
            font-family: 'Inter', sans-serif; 
            background-color: #000;
            touch-action: none;
        }

        .logo-or { font-weight: 900; border: 2px solid white; padding: 2px 10px; display: inline-block; }
        .outline-text { -webkit-text-stroke: 1.5px white; color: transparent; }

        /* Draggable Styling - Higher Z-index to ensure they are touchable */
        .draggable {
            position: absolute;
            width: 120px; height: 160px;
            z-index: 50; 
            touch-action: none;
            user-select: none;
            will-change: transform;
            cursor: grab;
        }
        
        @media (min-width: 768px) {
            .draggable { width: 220px; height: 300px; }
        }

        .draggable img {
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(100%) brightness(0.6);
            border: 0.5px solid rgba(255,255,255,0.3);
            pointer-events: none;
            transition: filter 0.3s ease, transform 0.3s ease;
        }

        /* Active dragging state */
        .draggable.dragging { cursor: grabbing; }
        .draggable.dragging img {
            filter: grayscale(0%) brightness(1);
            transform: scale(1.05);
            border-color: #fff;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Layer Helpers */
        .pointer-none { pointer-events: none; }
        .pointer-auto { pointer-events: auto; }
    </style>
</head>
<body class="text-white select-none">

    <div class="fixed inset-0 z-0">
        <video id="bgVideo" autoplay loop muted playsinline webkit-playsinline preload="auto" class="w-full h-full object-cover opacity-40">
            <source src="https://vjs.zencdn.net/v/oceans.mp4" type="video/mp4">
        </video>
        <div class="absolute inset-0 bg-black/30"></div>
    </div>

    <div id="canvas" class="fixed inset-0 z-40 pointer-none">
        <div class="draggable pointer-auto" style="top: 15%; left: 10%;"><img src="https://picsum.photos/id/429/400/600"></div>
        <div class="draggable pointer-auto" style="top: 10%; left: 55%;"><img src="https://picsum.photos/id/431/400/600"></div>
        <div class="draggable pointer-auto" style="top: 45%; left: 5%;"><img src="https://picsum.photos/id/493/400/600"></div>
        <div class="draggable pointer-auto" style="top: 60%; left: 60%;"><img src="https://picsum.photos/id/635/400/600"></div>
        <div class="draggable pointer-auto" style="top: 30%; left: 35%;"><img src="https://picsum.photos/id/292/400/600"></div>
    </div>

    <nav class="fixed top-0 left-0 w-full z-30 flex justify-between p-8 items-center pointer-none">
        <div class="logo-or text-2xl pointer-auto">OR</div>
        <div class="font-black text-lg tracking-tighter uppercase">Oceayr Agency</div>
    </nav>

    <main class="fixed inset-0 z-20 flex flex-col items-center justify-center text-center pointer-none px-6">
        <h1 class="text-5xl md:text-[140px] font-black uppercase leading-[0.8] tracking-tighter mb-8">
            WE MAKE<br>
            <span class="outline-text">NOISE.</span>
        </h1>
        <button class="pointer-auto px-10 py-4 bg-white text-black font-black uppercase tracking-tighter hover:bg-red-600 hover:text-white transition-all text-xs md:text-sm">
            GET IN TOUCH
        </button>
    </main>

    <script>
        // Initialize Interactivity
        interact('.draggable').draggable({
            inertia: true,
            autoScroll: false,
            listeners: {
                start(event) {
                    event.target.classList.add('dragging');
                    event.target.style.zIndex = 100;
                    startVideo(); // Wake up video on first touch
                },
                move(event) {
                    const target = event.target;
                    const x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
                    const y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;

                    target.style.transform = `translate(${x}px, ${y}px)`;
                    target.setAttribute('data-x', x);
                    target.setAttribute('data-y', y);
                },
                end(event) {
                    event.target.classList.remove('dragging');
                    event.target.style.zIndex = 50;
                }
            }
        });

        // Autoplay Enforcer
        const startVideo = () => {
            const video = document.getElementById('bgVideo');
            if (video && video.paused) {
                video.play().catch(e => console.log("Wake up failed:", e));
            }
        };

        document.addEventListener('touchstart', startVideo, { once: true });
        document.addEventListener('mousedown', startVideo, { once: true });
    </script>
</body>
</html>
