<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCEAYR | Marketing Atelier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000; 
            height: 100vh; 
            overflow: hidden; 
            touch-action: none; /* Prevents screen bouncing on mobile */
        }
        
        .logo-or { font-weight: 900; border: 2px solid white; padding: 2px 10px; display: inline-block; }
        .outline-text { -webkit-text-stroke: 1px white; color: transparent; }

        /* Responsive Draggable Styling */
        .draggable {
            position: absolute;
            width: 140px; height: 190px; /* Smaller for mobile */
            z-index: 5;
            touch-action: none;
            user-select: none;
        }
        @media (min-width: 768px) {
            .draggable { width: 200px; height: 270px; } /* Larger for desktop */
        }

        .draggable img {
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(100%) brightness(0.7);
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: none;
            transition: filter 0.3s ease;
        }
        .draggable:active { z-index: 50; }
        .draggable:hover img { filter: grayscale(0%) brightness(1); border-color: #fff; }
    </style>
</head>
