<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCEAYR | Marketing Atelier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; cursor: crosshair; }
        
        .logo-or {
            font-weight: 900; border: 2px solid white; padding: 2px 10px;
            display: inline-block; transition: all 0.3s ease;
        }
        .outline-text { -webkit-text-stroke: 1.5px white; color: transparent; }

        /* Floating Image Styling */
        .floating-img {
            position: absolute;
            width: 200px; height: 280px;
            z-index: 5;
            transition: transform 0.3s ease-out;
            pointer-events: auto;
        }
        .floating-img img {
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(100%) brightness(0.6);
            transition: all 0.5s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .floating-img:hover img {
            filter: grayscale(0%) brightness(1);
            transform: scale(1.1);
            border-color: white;
        }
    </style>
</head>
<body class="text-white overflow-hidden select-none">

    <div class="fixed inset-0 z-0">
        <video autoplay loop muted playsinline class="w-full h-full object-cover opacity-50">
            <source src="https://cdn.pixabay.com/video/2020/10/22/53232-473523269_large.mp4" type="video/mp4">
        </video>
        <div class="absolute inset-0 bg-black/30"></div>
    </div>

    <div id="gallery">
        <div class="floating-img hidden md:block" style="top: 10%; left: 5%;" data-speed="2"><img src="https://picsum.photos/id/10/400/600"></div>
        <div class="floating-img hidden md:block" style="top: 20%; left: 25%;" data-speed="-3"><img src="https://picsum.photos/id/20/400/600"></div>
        <div class="floating-img hidden md:block" style="top: 5%; left: 60%;" data-speed="4"><img src="https://picsum.photos/id/30/400/600"></div>
        <div class="floating-img hidden md:block" style="top: 15%; right: 5%;" data-speed="-2"><img src="https://picsum.photos/id/40/400/600"></div>
        <div class="floating-img hidden md:block" style="top: 45%; left: 2%;" data-speed="5"><img src="https://picsum.photos/id/50/400/600"></div>
        <div class="floating-img hidden md:block" style="top: 60%; left: 20%;" data-speed="-4"><img src="https://picsum.photos/id/60/400/600"></div>
        <div class="floating-img hidden md:block" style="top: 50%; right: 25%;" data-speed="3"><img src="https://picsum.photos/id/70/400/600"></div>
        <div class="floating-img hidden md:block" style="top: 70%; right: 5%;" data-speed="-5"><img src="https://picsum.photos/id/80/400/600"></div>
        <div class="floating-img hidden md:block" style="top: 80%; left: 40%;" data-speed="2"><img src="https://picsum.photos/id/90/400/600"></div>
        <div class="floating-img hidden md:block" style="top: 40%; left: 45%;" data-speed="-3"><img src="https://picsum.photos/id/100/400/600"></div>
    </div>

    <nav class="relative z-20 flex justify-between p-10 items-center">
        <div class="logo-or text-3xl">OR</div>
        <div class="font-black text-xl tracking-tighter uppercase">Oceayr Agency</div>
        <div class="hidden md:flex gap-10 uppercase text-[10px] tracking-[0.4em] font-bold">
            <a href="#" class="hover:line-through">Studio</a>
            <a href="#" class="hover:line-through">Cinema</a>
            <a href="#" class="hover:line-through">Contact</a>
        </div>
    </nav>

    <main class="relative z-10 flex flex-col items-center justify-center min-h-[70vh] px-10 text-center">
        <h2 class="text-[10px] uppercase tracking-[1em] mb-12 text-white/60">Marketing Atelier // Dubai</h2>
        
        <h1 class="text-7xl md:text-[150px] font-black uppercase leading-[0.85] tracking-tighter mb-10">
            WE MAKE<br>
            <span class="outline-text">NOISE.</span>
        </h1>

        <button class="px-14 py-6 bg-white text-black font-black uppercase tracking-tighter hover:bg-red-600 hover:text-white transition-all duration-500 text-lg">
            START A PROJECT
        </button>
    </main>

    <footer class="fixed bottom-0 left-0 w-full p-10 flex justify-between items-end z-20">
        <div class="text-[10px] text-gray-400 uppercase tracking-[0.5em]">25.2048° N, 55.2708° E</div>
        <div class="text-[10px] tracking-widest text-gray-400 uppercase font-bold">© 2026 OCEAYR STUDIO</div>
    </footer>

    <script>
        document.addEventListener("mousemove", (e) => {
            const x = (e.clientX - window.innerWidth / 2) / 30;
            const y = (e.clientY - window.innerHeight / 2) / 30;

            document.querySelectorAll('.floating-img').forEach(img => {
                const speed = img.getAttribute('data-speed');
                img.style.transform = `translate(${x * speed}px, ${y * speed}px)`;
            });
        });
    </script>
</body>
</html>
