<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCEAYR | Agency</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Orbitron:wght@400&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
<script src="https://unpkg.com/@studio-freight/lenis@1.0.34/dist/lenis.min.js"></script>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
    cursor: default;
    user-select: none;
}

.video-wrapper {
    position: fixed;
    inset: 0;
    z-index: -1;
    overflow: hidden;
}
.video-wrapper video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.45;
}

.logo-container {
    position: fixed;
    top: 35px;
    left: 40px;
    z-index: 1000;
}
.or-logo {
    font-weight: 900;
    font-size: 24px;
    border: 2px solid white;
    padding: 0 8px;
}

.nav-links {
    position: fixed;
    top: 40px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 50px;
    font-size: 11px;
    letter-spacing: .4em;
    text-transform: uppercase;
    z-index: 1000;
}
.nav-links a {
    color: white;
    text-decoration: none;
    opacity: .5;
    position: relative;
    padding-bottom: 4px;
    transition: opacity 0.3s ease;
}
.nav-links a:hover { opacity: 1; }
.nav-links a::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 0; height: 1px;
    background: #00ffff;
    transition: width 0.4s cubic-bezier(0.25, 1, 0.5, 1);
}
.nav-links a:hover::after { width: 100%; }

.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
}
.massive-title {
    font-size: 11vw;
    font-weight: 900;
    line-height: .82;
    text-align: center;
}
.outline {
    color: transparent;
    -webkit-text-stroke: 1px white;
}

/* ── TICKER ── */
.moving-title-wrap {
    height: 140px;
    display: flex;
    align-items: center;
    overflow: hidden;
    margin-top: 100px;
    margin-bottom: 140px;
    border-top: 1px solid rgba(255,255,255,0.1);
    border-bottom: 1px solid rgba(255,255,255,0.1);
}
.ticker-track {
    display: flex;
    flex-shrink: 0;
    width: max-content;
    animation: moveText 12s linear infinite;
    will-change: transform;
}
.ticker-track span {
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    color: #00ffff;
    white-space: nowrap;
    letter-spacing: 0.8em;
    padding-right: 3em;
    flex-shrink: 0;
}
@keyframes moveText {
    from { transform: translateX(0%); }
    to   { transform: translateX(-50%); }
}

/* ── GALLERY ── */
.gallery-section {
    position: relative;
    /* height set by JS based on layout */
}

.card-wrapper {
    position: absolute;
    will-change: transform;
}

/* PC card sizes — untouched */
.card {
    width: 460px;
    height: 680px;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0,0,0,.5);
}
.card.narrow {
    width: 400px;
    height: 620px;
}
.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
    transition: transform 0.6s ease;
}
.card-wrapper:hover .card img {
    transform: scale(1.04);
}

/* ── MOBILE ── */
@media (max-width: 768px) {
    .logo-container { top: 20px; left: 20px; }
    .nav-links { top: 25px; gap: 15px; font-size: 8px; letter-spacing: 0.15em; }
    .massive-title { font-size: 15vw; }
    .moving-title-wrap { height: 70px; margin-top: 50px; margin-bottom: 60px; }
    .ticker-track span { font-size: 13px; letter-spacing: 0.5em; }

    .card {
        width: 30vw !important;
        height: 44vw !important;
    }
    .card.narrow {
        width: 27vw !important;
        height: 40vw !important;
    }
}
</style>
</head>
<body>

<div class="logo-container">
    <div class="or-logo">OR</div>
</div>

<nav class="nav-links">
    <a href="#">Home</a>
    <a href="#gallery">Work</a>
    <a href="#">Studio</a>
    <a href="#">Contact</a>
</nav>

<section class="hero">
    <div class="video-wrapper">
        <video autoplay muted loop playsinline id="bgVideo">
            <source src="https://res.cloudinary.com/demo/video/upload/q_auto/sea_turtle.mp4" type="video/mp4">
        </video>
    </div>
    <h1 class="massive-title">OCEAYR<br><span class="outline">AGENCY</span></h1>
</section>

<div class="moving-title-wrap">
    <div class="ticker-track">
        <span>SHUFFLE OUR ART WORKS &nbsp;&nbsp; SHUFFLE OUR ART WORKS &nbsp;&nbsp; SHUFFLE OUR ART WORKS &nbsp;&nbsp;</span>
        <span>SHUFFLE OUR ART WORKS &nbsp;&nbsp; SHUFFLE OUR ART WORKS &nbsp;&nbsp; SHUFFLE OUR ART WORKS &nbsp;&nbsp;</span>
    </div>
</div>

<section class="gallery-section" id="gallery"></section>

<script>
/* ── VIDEO ── */
const video = document.getElementById('bgVideo');
['touchstart','mousedown','scroll'].forEach(ev =>
    window.addEventListener(ev, () => video.play().catch(()=>{}), {once:true})
);

/* ── LENIS ── */
const lenis = new Lenis({ lerp: 0.06 });

/* ── DEVICE ── */
const isMobile = window.innerWidth <= 768;

/* ── IMAGES ── */
const images = [
    'https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=800&q=80',
    'https://images.unsplash.com/photo-1511367461989-f85a21fda167?w=800&q=80',
    'https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?w=800&q=80',
    'https://images.unsplash.com/photo-1519125323398-675f0ddb6308?w=800&q=80',
    'https://images.unsplash.com/photo-1465101046530-73398c7f28ca?w=800&q=80',
    'https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=800&q=80',
    'https://images.unsplash.com/photo-1487412720507-e7ab37603c6f?w=800&q=80',
    'https://images.unsplash.com/photo-1504384308090-c894fdcc538d?w=800&q=80',
    'https://images.unsplash.com/photo-1519985176271-adb1088fa94c?w=800&q=80'
];

/* ─────────────────────────────────────────────────────────────────────
   LAYOUT STRATEGY
   The key to loud.ae-style overlap is:
   1. Row gap is SMALLER than card height → rows already overlap in DOM
   2. Each card has a different parallax speed → as you scroll, fast cards
      race upward and slice through slow cards from the row below,
      creating dynamic depth that changes as you scroll.

   PC card height = 680px. Row gap = 480px (gap < height = 200px overlap in DOM)
   Mobile card height = 44vw. Row gap scaled proportionally.

   Per-card speeds are HIGH (0.30–0.55) and deliberately varied so
   neighbouring cards separate/cross each other dramatically on scroll.
─────────────────────────────────────────────────────────────────────*/

const PC_LAYOUT = [
    // ROW 0  — starts at top of gallery
    { left:5,  top:  80, type:'normal', speed:0.50 },
    { left:33, top: 220, type:'normal', speed:0.28 },
    { left:62, top: 120, type:'narrow', speed:0.42 },

    // ROW 1  — top: 480px (200px below bottom of shortest card in row 0)
    //          So at scroll=0 they're hidden; parallax pulls them up fast
    { left:10, top: 700, type:'normal', speed:0.38 },
    { left:38, top: 860, type:'narrow', speed:0.55 },
    { left:65, top: 740, type:'normal', speed:0.32 },

    // ROW 2  — same gap below row 1
    { left:6,  top:1320, type:'normal', speed:0.46 },
    { left:35, top:1480, type:'normal', speed:0.30 },
    { left:64, top:1360, type:'narrow', speed:0.52 },
];

// Mobile: card is ~44vw tall. Scale tops proportionally.
// 44vw on a 390px screen ≈ 172px tall. Row gap ≈ 140px (overlap built in).
const MOBILE_LAYOUT = [
    { left:2,  top:  50, type:'normal', speed:0.50 },
    { left:35, top: 140, type:'normal', speed:0.28 },
    { left:66, top:  80, type:'narrow', speed:0.42 },

    { left:2,  top: 440, type:'normal', speed:0.38 },
    { left:35, top: 560, type:'narrow', speed:0.55 },
    { left:66, top: 470, type:'normal', speed:0.32 },

    { left:2,  top: 840, type:'normal', speed:0.46 },
    { left:35, top: 960, type:'normal', speed:0.30 },
    { left:66, top: 870, type:'narrow', speed:0.52 },
];

const layout = isMobile ? MOBILE_LAYOUT : PC_LAYOUT;

/* ── Gallery height: last card's top + card height + generous padding ── */
const galleryH = isMobile
    ? Math.max(...MOBILE_LAYOUT.map(l => l.top)) + 600
    : Math.max(...PC_LAYOUT.map(l => l.top)) + 1800;

const gallery = document.getElementById('gallery');
gallery.style.minHeight = galleryH + 'px';

/* ── BUILD CARDS ── */
const wrappers    = [];
const dragOffsets = [];

layout.forEach((pos, i) => {
    const wrap = document.createElement('div');
    wrap.className    = 'card-wrapper';
    wrap.style.left   = pos.left + '%';
    wrap.style.top    = pos.top + 'px';
    wrap.style.zIndex = i + 10;

    const card = document.createElement('div');
    card.className = 'card draggable' + (pos.type === 'narrow' ? ' narrow' : '');

    const img = document.createElement('img');
    img.src     = images[i];
    img.loading = i < 3 ? 'eager' : 'lazy';
    img.alt     = 'Artwork ' + (i + 1);

    card.appendChild(img);
    wrap.appendChild(card);
    gallery.appendChild(wrap);
    wrappers.push(wrap);
    dragOffsets.push({ x: 0, y: 0 });
});

/* ─────────────────────────────────────────────────────────────────────
   CONTINUOUS PARALLAX
   Hooked into lenis.on('scroll') so it fires every smooth-scroll frame.
   Each card moves up by scrollY × its own speed.
   High + varied speeds = swift movement + cards crossing each other.
─────────────────────────────────────────────────────────────────────*/
function updateParallax(scrollY) {
    wrappers.forEach((wrap, i) => {
        const speed = layout[i].speed;
        const dx    = dragOffsets[i].x;
        const dy    = dragOffsets[i].y - scrollY * speed;
        wrap.style.transform = `translate(${dx}px, ${dy}px)`;
    });
}

lenis.on('scroll', ({ scroll }) => updateParallax(scroll));

/* ── RAF loop ── */
function raf(time) {
    lenis.raf(time);
    requestAnimationFrame(raf);
}
requestAnimationFrame(raf);

updateParallax(0);

/* ── DRAGGABLE ── */
interact('.draggable').draggable({
    listeners: {
        start(event) {
            event.target.parentElement.style.zIndex = 3000;
        },
        move(event) {
            const idx = wrappers.indexOf(event.target.parentElement);
            if (idx < 0) return;
            dragOffsets[idx].x += event.dx;
            dragOffsets[idx].y += event.dy;
            updateParallax(lenis.scroll);
        }
    }
});
</script>
</body>
</html>
